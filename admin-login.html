<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AreGeek Admin - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1b7a3a 0%, #0f4620 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
        }

        .logo-section {
            margin-bottom: 30px;
        }

        .logo-section h1 {
            font-size: 32px;
            color: #1b7a3a;
            margin-bottom: 10px;
        }

        .logo-section p {
            font-size: 14px;
            color: #666;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
            text-align: left;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1b7a3a;
            box-shadow: 0 0 0 3px rgba(27, 122, 58, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #1b7a3a;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #0f4620;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(27, 122, 58, 0.3);
        }

        .error-message {
            color: #e74c3c;
            margin-bottom: 15px;
            padding: 10px;
            background: #fadbd8;
            border-radius: 6px;
            display: none;
        }

        .back-link {
            margin-top: 20px;
        }

        .back-link a {
            color: #1b7a3a;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <h1>🐧 AreGeek</h1>
            <p>Panel de Administración</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="password">Contraseña de Administrador</label>
                <input type="password" id="password" placeholder="Ingresa la contraseña" required>
            </div>
            <button type="submit" class="login-btn">Acceder</button>
        </form>

        <div class="back-link">
            <a href="index.html">← Volver a la tienda</a>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = 'areg33k5152';

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');

            if (password === ADMIN_PASSWORD) {
                // Guardar sesión en localStorage
                localStorage.setItem('adminLoggedIn', 'true');
                localStorage.setItem('adminLoginTime', Date.now());
                window.location.href = 'admin.html';
            } else {
                errorDiv.textContent = '❌ Contraseña incorrecta';
                errorDiv.style.display = 'block';
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });
    </script>
</body>
</html>
